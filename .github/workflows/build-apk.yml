name: Build MediTrack APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-32" "build-tools;32.0.0"

      - name: Build TWA APK
        run: |
          mkdir apk-build && cd apk-build
          mkdir -p "$HOME/.bubblewrap"
          node -e "const sdk=process.env.ANDROID_HOME||process.env.ANDROID_SDK_ROOT;require('fs').writeFileSync(process.env.HOME+'/.bubblewrap/config.json',JSON.stringify({jdkPath:process.env.JAVA_HOME,androidSdkPath:sdk}));"
          echo "Config: $(cat $HOME/.bubblewrap/config.json)"
          node -e "require('fs').writeFileSync('twa-manifest.json',JSON.stringify({packageId:'com.meditrack.app',host:'meditrack-borinots-v1-02.netlify.app',name:'MediTrack',launcherName:'MediTrack',display:'standalone',orientation:'portrait',themeColor:'#0a1628',navigationColor:'#0a1628',navigationColorDark:'#0a1628',navigationDividerColor:'#0a1628',navigationDividerColorDark:'#0a1628',backgroundColor:'#0a1628',enableNotifications:false,startUrl:'/',iconUrl:'https://meditrack-borinots-v1-02.netlify.app/icon-512.png',maskableIconUrl:'https://meditrack-borinots-v1-02.netlify.app/icon-512.png',monochromeIconUrl:null,splashScreenFadeOutDuration:300,signingMode:'new',signing:{alias:'meditrack-key',fullName:'MediTrack',organization:'MediTrack',organizationalUnit:'App',countryCode:'ES',keyPassword:'MediTrack2024!',storePassword:'MediTrack2024!',file:null},appVersion:'1',appVersionName:'1.0.0',shortName:'MediTrack',generatorApp:'bubblewrap-cli',webManifestUrl:'https://meditrack-borinots-v1-02.netlify.app/manifest.json',isChromeOSOnly:false,isMetaQuest:false,minSdkVersion:19,targetSdkVersion:32,fingerprints:[],shortcuts:[],features:{locationDelegation:{enabled:true},playBilling:{enabled:false}},alphaDependencies:{enabled:false},enableSiteSettingsShortcut:true,isSplashScreenEnabled:true,isIconMaskable:true,fullScopeUrl:'https://meditrack-borinots-v1-02.netlify.app/',rotationEnabled:false,serviceAccountJsonFile:null,fallbackType:'customtabs',additionalTrustedOrigins:[],retainedBundles:[],ratingDelegation:false},null,2));console.log('twa-manifest.json created');"
          echo "y" | bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meditrack-apk
          path: |
            apk-build/app-release-signed.apk
            apk-build/app-release.aab
          if-no-files-found: warn
