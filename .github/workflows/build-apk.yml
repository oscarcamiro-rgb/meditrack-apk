name: Build MediTrack APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-32" "build-tools;32.0.0"

      - name: Generate TWA Project and Build APK
        run: |
          mkdir apk-build && cd apk-build
          mkdir -p "$HOME/.bubblewrap"
          node -e "const sdk=process.env.ANDROID_HOME||process.env.ANDROID_SDK_ROOT;require('fs').writeFileSync(process.env.HOME+'/.bubblewrap/config.json',JSON.stringify({jdkPath:process.env.JAVA_HOME,androidSdkPath:sdk}));console.log('Bubblewrap config written');"
          keytool -genkeypair -alias meditrack-key -keyalg RSA -keysize 2048 -validity 10000 -keystore android.keystore -storepass "MediTrack2024!" -keypass "MediTrack2024!" -dname "CN=MediTrack, OU=App, O=MediTrack, L=Barcelona, ST=Catalonia, C=ES" -storetype JKS -noprompt
          echo "Keystore created: $(ls -la android.keystore)"
          node -e "require('fs').writeFileSync('twa-manifest.json',JSON.stringify({packageId:'com.meditrack.app',host:'meditrack-borinots-v1-02.netlify.app',name:'MediTrack',launcherName:'MediTrack',display:'standalone',orientation:'portrait',themeColor:'#0a1628',navigationColor:'#0a1628',navigationColorDark:'#0a1628',navigationDividerColor:'#0a1628',navigationDividerColorDark:'#0a1628',backgroundColor:'#0a1628',enableNotifications:false,startUrl:'/',iconUrl:'https://meditrack-borinots-v1-02.netlify.app/icon-512.png',maskableIconUrl:'https://meditrack-borinots-v1-02.netlify.app/icon-512.png',monochromeIconUrl:null,splashScreenFadeOutDuration:300,signingMode:'none',signing:null,appVersion:'1',appVersionName:'1.0.0',shortName:'MediTrack',generatorApp:'bubblewrap-cli',webManifestUrl:'https://meditrack-borinots-v1-02.netlify.app/manifest.json',isChromeOSOnly:false,isMetaQuest:false,minSdkVersion:19,targetSdkVersion:32,fingerprints:[],shortcuts:[],features:{locationDelegation:{enabled:true},playBilling:{enabled:false}},alphaDependencies:{enabled:false},enableSiteSettingsShortcut:true,isSplashScreenEnabled:true,isIconMaskable:true,fullScopeUrl:'https://meditrack-borinots-v1-02.netlify.app/',rotationEnabled:false,serviceAccountJsonFile:null,fallbackType:'customtabs',additionalTrustedOrigins:[],retainedBundles:[],ratingDelegation:false},null,2));console.log('twa-manifest.json created');"
          echo "Running bubblewrap to generate Android project..."
          yes | bubblewrap build 2>&1 || true
          echo "=== Files after bubblewrap ==="
          ls -la
          if [ ! -f "gradlew" ]; then
            echo "ERROR: gradlew not found - project generation failed"
            exit 1
          fi
          chmod +x gradlew
          KEYSTORE_PATH="$(pwd)/android.keystore"
          echo "Building signed release APK with Gradle..."
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="MediTrack2024!" \
            -Pandroid.injected.signing.key.alias="meditrack-key" \
            -Pandroid.injected.signing.key.password="MediTrack2024!" \
            --no-daemon
          echo "Building AAB..."
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="MediTrack2024!" \
            -Pandroid.injected.signing.key.alias="meditrack-key" \
            -Pandroid.injected.signing.key.password="MediTrack2024!" \
            --no-daemon
          echo "=== Locating output files ==="
          find . -name "*.apk" -not -path "*/intermediates/*"
          find . -name "*.aab"
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          AAB=$(find . -name "*.aab" | head -1)
          [ -n "$APK" ] && cp "$APK" app-release-signed.apk && echo "APK ready" || echo "APK not found"
          [ -n "$AAB" ] && cp "$AAB" app-release.aab && echo "AAB ready" || echo "AAB not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meditrack-apk
          path: |
            apk-build/app-release-signed.apk
            apk-build/app-release.aab
          if-no-files-found: warn
